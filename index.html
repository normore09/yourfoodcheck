<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz: คุณเหมาะกับอาหารสัญชาติไหน?</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #ff6b6b;
            --secondary: #4ecdc4;
            --dark: #2f2f2f;
            --light: #f9f9f9;
            --bg-gradient: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            --card-bg: #ffffff;
            --text-main: #333;
            --transition-speed: 0.4s;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Kanit', sans-serif;
        }

        body {
            background: var(--bg-gradient);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: var(--text-main);
            overflow-x: hidden;
            padding: 20px 0;
        }

        #app {
            width: 95%;
            max-width: 500px;
            background: var(--card-bg);
            padding: 2.5rem 2rem;
            border-radius: 24px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            position: relative;
            min-height: 500px;
            display: flex;
            flex-direction: column;
            transition: all var(--transition-speed) ease;
        }

        .screen {
            display: none;
            opacity: 0;
            transform: translateY(10px);
            transition: opacity var(--transition-speed) ease, transform var(--transition-speed) ease;
        }

        .screen.active {
            display: flex;
            flex-direction: column;
            opacity: 1;
            transform: translateY(0);
        }

        /* Start Screen */
        .start-screen {
            text-align: center;
            justify-content: center;
            height: 100%;
        }

        .start-screen h1 {
            font-size: 2.2rem;
            color: var(--primary);
            margin-bottom: 1.2rem;
            line-height: 1.2;
        }

        .start-screen p {
            margin-bottom: 2.5rem;
            color: #666;
            font-weight: 300;
        }

        /* Quiz Screen */
        .progress-container {
            width: 100%;
            height: 6px;
            background: #f0f0f0;
            border-radius: 10px;
            margin-bottom: 1.5rem;
            overflow: hidden;
        }

        .progress-bar {
            height: 100%;
            background: var(--secondary);
            width: 0%;
            transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .quiz-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.8rem;
        }

        .question-number {
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--secondary);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .back-btn {
            background: none;
            border: none;
            color: #999;
            font-size: 0.85rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 5px;
            transition: color 0.2s;
            padding: 5px;
            border-radius: 8px;
        }

        .back-btn:hover {
            color: var(--primary);
            background: #fff5f5;
        }

        .question-text {
            font-size: 1.4rem;
            font-weight: 600;
            margin-bottom: 2rem;
            line-height: 1.4;
            color: var(--dark);
        }

        .options-container {
            display: grid;
            gap: 12px;
        }

        .option-btn {
            background: #fff;
            border: 2px solid #f0f0f0;
            padding: 1.1rem 1.3rem;
            border-radius: 16px;
            cursor: pointer;
            text-align: left;
            font-size: 1rem;
            transition: all 0.25s ease;
            outline: none;
            color: #444;
        }

        .option-btn:hover {
            border-color: var(--secondary);
            background: #fafffe;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(78, 205, 196, 0.15);
        }

        /* Result Screen */
        .result-screen {
            text-align: center;
        }

        .result-title {
            font-size: 0.9rem;
            font-weight: 600;
            color: #999;
            text-transform: uppercase;
            letter-spacing: 1.5px;
        }

        .result-name {
            font-size: 2.6rem;
            font-weight: 600;
            color: var(--primary);
            margin: 0.8rem 0;
            line-height: 1.1;
        }

        .result-subtitle {
            font-size: 1.1rem;
            font-style: italic;
            color: #555;
            margin-bottom: 1.5rem;
        }

        .result-desc {
            text-align: left;
            font-size: 0.95rem;
            line-height: 1.7;
            color: #555;
            background: #fcfcfc;
            padding: 1.5rem;
            border-radius: 16px;
            border-left: 6px solid var(--primary);
            margin-bottom: 2rem;
            max-height: 400px;
            overflow-y: auto;
        }

        /* Explorer Section */
        .explorer-section {
            margin-top: 1rem;
            padding-top: 2rem;
            border-top: 2px dashed #eee;
        }

        .explorer-title {
            font-size: 0.9rem;
            color: #888;
            margin-bottom: 1rem;
        }

        .explorer-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin-bottom: 2rem;
        }

        .explore-btn {
            background: #fff;
            border: 1px solid #ddd;
            padding: 12px 8px;
            border-radius: 12px;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s;
            line-height: 1.4;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 60px;
        }

        .explore-btn:hover {
            border-color: var(--secondary);
            background: #f0fffe;
        }

        .explore-btn.active-choice {
            background: var(--secondary);
            color: white;
            border-color: var(--secondary);
            box-shadow: 0 4px 10px rgba(78, 205, 196, 0.3);
        }

        .btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 1.1rem 2.5rem;
            border-radius: 50px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 6px 20px rgba(255, 107, 107, 0.3);
            width: fit-content;
            margin: 0 auto;
        }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(255, 107, 107, 0.4);
        }

        @media (max-width: 480px) {
            #app { padding: 2rem 1.2rem; }
            .question-text { font-size: 1.2rem; }
            .result-name { font-size: 2rem; }
            .explorer-grid { grid-template-columns: 1fr; }
            .explore-btn { min-height: 50px; }
        }
    </style>
</head>
<body>

    <div id="app">
        <!-- Start Screen -->
        <div id="start-screen" class="screen active start-screen">
            <h1>คุณเหมาะกับอาหาร<br>สัญชาติไหน?</h1>
            <p>ค้นหาตัวตนที่ซ่อนอยู่ในรสชาติที่คุณโปรดปราน</p>
            <button class="btn" onclick="startQuiz()">เริ่มเลย</button>
        </div>

        <!-- Quiz Screen -->
        <div id="quiz-screen" class="screen">
            <div class="progress-container">
                <div id="progress-bar" class="progress-bar"></div>
            </div>
            <div class="quiz-header">
                <div id="question-count" class="question-number">QUESTION 1 / 10</div>
                <button id="back-btn" class="back-btn" onclick="goBack()" style="display: none;">
                    ← ย้อนกลับ
                </button>
            </div>
            <div id="question-text" class="question-text">คำถาม</div>
            <div id="options" class="options-container"></div>
        </div>

        <!-- Result Screen -->
        <div id="result-screen" class="screen result-screen">
            <img id="result-image" style="width: 100%; max-width: 260px; margin: 1rem auto; display: block;" />
            <div class="result-title">ผลลัพธ์ของคุณคือ</div>
            <div id="result-name" class="result-name">ชื่อสัญชาติ</div>
            <div id="result-subtitle" class="result-subtitle">สโลแกน</div>
            <div id="result-desc" class="result-desc">คำอธิบาย</div>
            
            <button class="btn" style="margin-bottom: 2rem;" onclick="restartQuiz()">เล่นอีกครั้ง</button>

            <!-- Explorer Section -->
            <div class="explorer-section">
                <div class="explorer-title">ดูผลลัพธ์ประเภทอื่นๆ</div>
                <div id="explorer-grid" class="explorer-grid">
                    <!-- Buttons will be injected here via JS -->
                </div>
            </div>
        </div>
    </div>

    <script>
        const questionBank = [

                    { text: "เน้นรสชาติกลมกล่อม", weight: "thai" },
                    { text: "เน้นรสสัมผัสที่มัน", weight: "chinese" },
                    { text: "มีกลิ่นที่เป็นเอกลักษณ์", weight: "indian" }

                    { text: "รสชาติที่เด่นชัด", weight: "thai" },
                    { text: "ความหลากหลาย", weight: "chinese" },

                options: [

                ]
            },
            {
                q: "คุณชอบอาหารโทนสีประมาณไหน?",
                options: [
                    { text: "โทนสีอ่อน (เหลือง/ธรรมชาติ)", weight: "japanese" },
                    { text: "โทนสีสดใส (ส้ม)", weight: "thai" },
                    { text: "โทนสีเข้มข้น ร้อนแรง (แดง)", weight: "chinese" },
                    { text: "โทนสีอบอุ่น (น้ำตาลเครื่องเทศ)", weight: "indian" }
                ]
            },
            {
                q: "คุณจะเลือกกินเมนูของหวานอะไร?",
                options: [
                    { text: "วาราบิโมจิ", weight: "japanese" },
                    { text: "ข้าวเหนียวมะม่วง", weight: "thai" },
                    { text: "ถังหูลู่", weight: "chinese" },
                    { text: "กุหลาบ จามุน", weight: "indian" }
                ]
            }
        ];

        const resultsData = {
            japanese: {
                id: "japanese",
                name: "นิฮงจิน (日本人)",
                subtitle: "“ความเรียบง่ายที่เต็มไปด้วยความสมดุล”",
                desc: "คุณเหมาะกับอาหารญี่ปุ่น คุณให้ค่ากับความเรียบง่าย แต่ใส่ใจรายละเอียด และชื่นชอบความลงตัวมากกว่าความสุดโต่ง คุณชอบอาหารที่มีรสชาติอ่อน ละมุน และกลมกล่อม ไม่จัดจ้านเกินไป ให้ความสำคัญกับความประณีต ความสวยงาม และบรรยากาศในการกิน<br><br>อาหารญี่ปุ่นสะท้อนแนวคิด Washoku ซึ่งเน้นความกลมกลืนของ สี รสชาติ วิธีการปรุง และ ประสบการณ์ผ่านประสาทสัมผัส รวมถึงการใช้วัตถุดิบตามฤดูกาล อาหารจึงเน้น “ความพอดีและสมดุล”",
                image: "https://i.postimg.cc/VLwScdMh/IMG-3124.png"
            },
            thai: {
                id: "thai",
                name: "คนไทยแท้ 100%",
                subtitle: "“ความหลากหลายที่ลงตัวในจานเดียว”",
                desc: "คุณเหมาะกับอาหารไทย คุณเปิดรับความหลากหลาย และมองว่าอาหารคือความสุขและการเชื่อมโยงผู้คน คุณชอบอาหารที่มีรสชาติหลากหลาย ครบรส ทั้งเปรี้ยว หวาน เค็ม และเผ็ด สนุกกับการกินและการแบ่งปันอาหารร่วมกับผู้อื่น<br><br>อาหารไทยมีเอกลักษณ์จากการผสมผสานวัฒนธรรมทั้งจากอินเดีย จีน และตะวันตกทำให้เกิดรสชาติที่มีความซับซ้อนแต่ลงตัว เป็นตัวแทนของความหลากหลายและความกลมกล่อม",
                image: "https://i.postimg.cc/KvbKyRLC/IMG-3125.png"
            },
            chinese: {
                id: "chinese",
                name: "จงกั๋วเหริน (中国人)",
                subtitle: "“ความสมดุลของรสชาติ คือความสมดุลของชีวิต”",
                desc: "คุณเหมาะกับอาหารจีน คุณให้ความสำคัญกับอาหาร ทั้งในด้านรสชาติและคุณค่าโภชนาการต่อร่างกาย คุณมองอาหารในมุมที่ต้องการมากกว่าความอร่อย แต่เป็นเรื่องของความสมดุลและสุขภาพ<br><br>อาหารจีนสะท้อนแนวคิด สามารถช่วยปรับสมดุลของร่างกายได้ หยิน-หยาง (Yin–Yang) คือ สมดุลของร้อนและเย็น และ Five Elements (Wu Xing)",
                image: "https://i.postimg.cc/ncxstC70/IMG-3204.png"
            },
            indian: {
                id: "indian",
                name: "ชาวภารตะ (Bharat)",
                subtitle: "“อาหารคือพลังและความสมดุลภายใน”",
                desc: "คุณเหมาะกับอาหารอินเดีย คุณมองอาหารเป็นมากกว่าการกิน แต่เป็นการดูแลตัวเองจากภายใน คุณชอบอาหารที่มีรสชาติเข้มข้น มีกลิ่นเครื่องเทศชัดเจน และให้ความสำคัญกับคุณค่าทางสุขภาพของอาหาร<br><br>อาหารอินเดียมีพื้นฐานจากแนวคิด Ayurveda เครื่องเทศไม่ได้มีแค่รสชาติ แต่มีความสำคัญในเรื่องของสุขภาพและพลังงานในร่างกาย",
                image: "https://i.postimg.cc/4NGKTmtL/IMG-3127.png"
            }
        };

        let currentQuestionIndex = 0;
        let shuffledQuestions = [];
        let scores = { japanese: 0, thai: 0, chinese: 0, indian: 0 };
        let answerHistory = [];

        function showScreen(screenId) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            setTimeout(() => {
                const target = document.getElementById(screenId);
                if (target) target.classList.add('active');
            }, 50);
        }

        function startQuiz() {
            scores = { japanese: 0, thai: 0, chinese: 0, indian: 0 };
            currentQuestionIndex = 0;
            answerHistory = [];
            
            shuffledQuestions = shuffleArray([...questionBank]).map(q => ({
                ...q,
                options: shuffleArray([...q.options])
            }));
            
            renderQuestion();
            showScreen('quiz-screen');
        }

        function renderQuestion() {
            const currentQ = shuffledQuestions[currentQuestionIndex];
            document.getElementById('question-count').innerText = `Question ${currentQuestionIndex + 1} / ${shuffledQuestions.length}`;
            document.getElementById('question-text').innerText = currentQ.q;
            document.getElementById('progress-bar').style.width = `${(currentQuestionIndex / shuffledQuestions.length) * 100}%`;

            const backBtn = document.getElementById('back-btn');
            backBtn.style.display = currentQuestionIndex > 0 ? 'flex' : 'none';

            const container = document.getElementById('options');
            container.innerHTML = '';
            currentQ.options.forEach(opt => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.innerText = opt.text;
                btn.onclick = () => handleAnswer(opt.weight);
                container.appendChild(btn);
            });
        }

        function handleAnswer(weight) {
            scores[weight]++;
            answerHistory.push(weight);
            
            const quizContent = document.getElementById('quiz-screen');
            quizContent.style.opacity = '0';
            
            setTimeout(() => {
                currentQuestionIndex++;
                if (currentQuestionIndex < shuffledQuestions.length) {
                    renderQuestion();
                    quizContent.style.opacity = '1';
                } else {
                    showResult();
                }
            }, 300);
        }

        function goBack() {
            if (currentQuestionIndex > 0) {
                const lastWeight = answerHistory.pop();
                if (lastWeight) scores[lastWeight]--;
                currentQuestionIndex--;
                renderQuestion();
            }
        }

        function showResult() {
            let maxScore = -1;
            let resultKey = 'thai';
            for (const key in scores) {
                if (scores[key] > maxScore) {
                    maxScore = scores[key];
                    resultKey = key;
                }
            }
            displayResultContent(resultKey);
            showScreen('result-screen');
        }

        function displayResultContent(key) {
            const result = resultsData[key];
            const nameEl = document.getElementById('result-name');
            const subtitleEl = document.getElementById('result-subtitle');
            const descEl = document.getElementById('result-desc');
            const imgEl = document.getElementById('result-image');

            nameEl.style.opacity = '0';
            subtitleEl.style.opacity = '0';
            descEl.style.opacity = '0';
            

            setTimeout(() => {
                nameEl.innerText = result.name;
                subtitleEl.innerText = result.subtitle;
                descEl.innerHTML = result.desc;
                
                imgEl.src = result.image;

                // กันรูปโหลดไม่ได้
                imgEl.onerror = () => {
                    imgEl.src = "https://via.placeholder.com/250?text=Image";
                };
                nameEl.style.opacity = '1';
                subtitleEl.style.opacity = '1';
                descEl.style.opacity = '1';
            }, 200);

            renderExplorer(key);
        }

        function renderExplorer(activeKey) {
            const grid = document.getElementById('explorer-grid');
            grid.innerHTML = '';
            
            Object.keys(resultsData).forEach(key => {
                const btn = document.createElement('button');
                btn.className = `explore-btn ${key === activeKey ? 'active-choice' : ''}`;
                // ใช้ชื่อเต็มจากข้อมูลผลลัพธ์ (เช่น นิฮงจิน (日本人), คนไทยแท้ 100%)
                btn.innerText = resultsData[key].name;
                btn.onclick = () => displayResultContent(key);
                grid.appendChild(btn);
            });
        }

        function restartQuiz() {
            showScreen('start-screen');
        }

        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }
    </script>
</body>
</html>
