            indian: {
                name: "ชาวภารตะ (Bharat)", subtitle: "“อาหารคือพลังและความสมดุลภายใน”",
                desc: "คุณเหมาะกับอาหารอินเดีย คุณมองอาหารเป็นมากกว่าการกิน แต่เป็นการดูแลตัวเองจากภายใน คุณชอบอาหารที่มีรสชาติเข้มข้น มีกลิ่นเครื่องเทศชัดเจน และให้ความสำคัญกับคุณค่าทางสุขภาพของอาหาร<br><br>อาหารอินเดียมีพื้นฐานจากแนวคิด Ayurveda ซึ่งมองว่า อาหารคือยา และช่วยรักษาสมดุลของร่างกายผ่าน doshas (Vata, Pitta, Kapha) เครื่องเทศในอาหารอินเดียไม่ได้มีแค่รสชาติ แต่มีความสำคัญในเรื่องของสุขภาพและพลังงานในร่างกาย",
                recommended: "เมนูแนะนำ : แกงกะหรี่, นาน, ซาโมซา, ลาดู",
                image: "https://i.postimg.cc/4NGKTmtL/IMG-3127.png", color: "#A9907E"
            }
        };

        let currentQuestionIndex = 0;
        let shuffledQuestions = [];
        let scores = { japanese: 0, thai: 0, chinese: 0, indian: 0 };
        let answerHistory = [];
        let currentResultKey = '';

        function showScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        function startQuiz() {
            scores = { japanese: 0, thai: 0, chinese: 0, indian: 0 };
            currentQuestionIndex = 0;
            answerHistory = [];
            shuffledQuestions = shuffleArray([...questionBank]).map(q => ({
                ...q, options: shuffleArray([...q.options])
            }));
            renderQuestion();
            showScreen('quiz-screen');
        }

        function renderQuestion() {
            const q = shuffledQuestions[currentQuestionIndex];
            document.getElementById('question-count').innerText = `QUESTION ${currentQuestionIndex + 1} / 10`;
            document.getElementById('question-text').innerText = q.q;
            document.getElementById('progress-bar').style.width = `${(currentQuestionIndex / shuffledQuestions.length) * 100}%`;
            document.getElementById('back-btn').style.display = currentQuestionIndex > 0 ? 'flex' : 'none';

            const container = document.getElementById('options');
            container.innerHTML = '';
            q.options.forEach(opt => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.innerText = opt.text;
                btn.onclick = () => {
                    scores[opt.weight]++;
                    answerHistory.push(opt.weight);
                    currentQuestionIndex++;
                    if (currentQuestionIndex < shuffledQuestions.length) renderQuestion();
                    else showResult();
                };
                container.appendChild(btn);
            });
        }

        function goBack() {
            const last = answerHistory.pop();
            if (last) scores[last]--;
            currentQuestionIndex--;
            renderQuestion();
        }

        function showResult() {
            let max = -1, key = 'thai';
            for (const k in scores) if (scores[k] > max) { max = scores[k]; key = k; }
            currentResultKey = key;
            displayResult(key);
            showScreen('result-screen');
        }

        function displayResult(key) {
            const r = resultsData[key];
            document.documentElement.style.setProperty('--result-theme', r.color);
            document.getElementById('result-name').innerText = r.name;
            document.getElementById('result-subtitle').innerText = r.subtitle;
            document.getElementById('result-desc').innerHTML = r.desc;
            document.getElementById('result-recommended').innerText = r.recommended;
            document.getElementById('result-image').src = r.image;
            renderExplorer(key);
        }

        function renderExplorer(active) {
            const g = document.getElementById('explorer-grid');
            g.innerHTML = '';
            Object.keys(resultsData).forEach(k => {
                const b = document.createElement('button');
                b.className = `explore-btn ${k === active ? 'active-choice' : ''}`;
                b.innerText = resultsData[k].name;
                b.onclick = () => displayResult(k);
                g.appendChild(b);
            });
        }

        /**
         * System to capture image and prompt OS Share (allows IG Story sharing)
         */
        async function handleShare() {
            const btn = document.getElementById('share-btn');
            btn.innerText = "กำลังสร้างภาพ...";
            btn.style.opacity = "0.7";

            try {
                const canvas = await html2canvas(document.getElementById('capture-area'), {
                    useCORS: true,
                    scale: 2,
                    backgroundColor: "#ffffff"
                });

                canvas.toBlob(async (blob) => {
                    const file = new File([blob], `result-${currentResultKey}.png`, { type: 'image/png' });
                    
                    if (navigator.canShare && navigator.canShare({ files: [file] })) {
                        await navigator.share({
                            files: [file],
                            title: 'ผลลัพธ์ควิซอาหาร',
                            text: `ฉันได้เป็น "${resultsData[currentResultKey].name}"! ลองเล่นดูที่นี่`
                        });
                    } else {
                        // Fallback: Download image
                        const link = document.createElement('a');
                        link.href = URL.createObjectURL(blob);
                        link.download = `food-quiz-${currentResultKey}.png`;
                        link.click();
                        showToast("ไม่รองรับการแชร์โดยตรง บันทึกภาพลงเครื่องแล้ว!");
                    }
                });
            } catch (e) {
                showToast("เกิดข้อผิดพลาดในการแชร์");
            } finally {
                btn.innerText = "แชร์ผลลัพธ์";
                btn.style.opacity = "1";
            }
        }

        function restartQuiz() { showScreen('start-screen'); }
        function showToast(msg) {
            const t = document.getElementById('toast');
            t.innerText = msg;
            t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 3000);
        }
        function shuffleArray(arr) {
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
            return arr;
        }
    </script>
