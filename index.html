        @keyframes fadeInSlideUp {
            from {

                opacity: 1;

            }

        .screen {
            display: none;

            background: #f0f0f0;
            border-radius: 12px;

            font-size: 0.95rem;
            font-weight: 600;
            color: #999;
            text-transform: uppercase;

            color: #555;

        }

        .result-desc {
            text-align: left;
            font-size: 1rem;
            line-height: 1.8;
            color: #555;
            background: #fdfdfd;
            padding: 1.8rem;
            border-radius: 20px;
            border-left: 8px solid var(--result-theme);
            margin-bottom: 1rem;
            max-height: 350px;
            overflow-y: auto;
            transition: border-color 0.3s ease;

            text-align: left;
            font-size: 1rem;
            font-weight: 600;
            color: var(--result-theme);
            margin-bottom: 2rem;
            padding: 0 0.5rem;
            transition: color 0.3s ease;

        .action-buttons {

            justify-content: center;
            margin-bottom: 2rem;

            background: var(--primary);

            border: none;
            padding: 1.1rem 2.5rem;

            font-size: 1.1rem;
            font-weight: 600;

            .explorer-grid { grid-template-columns: 1fr; }
            .action-buttons { flex-direction: column; }
            .btn { width: 100%; justify-content: center; }
        }
    </style>
</head>

                name: "จงกั๋วเหริน (中国人)",
                subtitle: "“ความสมดุลของรสชาติ คือความสมดุลของชีวิต”",
                desc: "คุณเหมาะกับอาหารจีน คุณให้ความสำคัญกับอาหาร ทั้งในด้านรสชาติและคุณค่าโภชนาการต่อร่างกาย คุณมองอาหารในมุมที่ต้องการมากกว่าความอร่อย แต่เป็นเรื่องของความสมดุลและสุขภาพ<br><br>อาหารจีนสะท้อนแนวคิด สามารถช่วยปรับสมดุลของร่างกายได้ หยิน-หยาง(Yin–Yang) คือ สมดุลของร้อนและเย็น, Five Elements (Wu Xing) คือความเชื่อมโยงของรสชาติ ธาตุ และร่างกาย อาหารจีนไม่ได้มีแค่รสชาติ แต่เป็นส่วนหนึ่งของการรักษาสมดุลในร่างกาย",
                recommended: "เมนูแนะนำ : เต้าหู้ผัดซอส, เป็ดปักกิ่ง, หมาล่า, เสี่ยวหลงเปา",
                image: "https://i.postimg.cc/ncxstC70/IMG-3204.png",
                color: "#FF8B8B" // Pastel Red
            },
            indian: {
                id: "indian",
                name: "ชาวภารตะ (Bharat)",
                subtitle: "“อาหารคือพลังและความสมดุลภายใน”",
                desc: "คุณเหมาะกับอาหารอินเดีย คุณมองอาหารเป็นมากกว่าการกิน แต่เป็นการดูแลตัวเองจากภายใน คุณชอบอาหารที่มีรสชาติเข้มข้น มีกลิ่นเครื่องเทศชัดเจน และให้ความสำคัญกับคุณค่าทางสุขภาพของอาหาร<br><br>อาหารอินเดียมีพื้นฐานจากแนวคิด Ayurveda ซึ่งมองว่า อาหารคือยา และช่วยรักษาสมดุลของร่างกายผ่าน doshas (Vata, Pitta, Kapha) เครื่องเทศในอาหารอินเดียไม่ได้มีแค่รสชาติ แต่มีความสำคัญในเรื่องของสุขภาพและพลังงานในร่างกาย",
                recommended: "เมนูแนะนำ : แกงกะหรี่, นาน, ซาโมซา, ลาดู",
                image: "https://i.postimg.cc/4NGKTmtL/IMG-3127.png",
                color: "#A9907E" // Pastel Brown
            }
        };

        let currentQuestionIndex = 0;
        let shuffledQuestions = [];
        let scores = { japanese: 0, thai: 0, chinese: 0, indian: 0 };
        let answerHistory = [];
        let currentResultKey = '';

        function showScreen(screenId) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            const target = document.getElementById(screenId);
            if (target) {
                target.classList.add('active');
            }
        }

        function startQuiz() {
            scores = { japanese: 0, thai: 0, chinese: 0, indian: 0 };
            currentQuestionIndex = 0;
            answerHistory = [];
            
            shuffledQuestions = shuffleArray([...questionBank]).map(q => ({
                ...q,
                options: shuffleArray([...q.options])
            }));
            
            renderQuestion();
            showScreen('quiz-screen');
        }

        function renderQuestion() {
            const currentQ = shuffledQuestions[currentQuestionIndex];
            document.getElementById('question-count').innerText = `QUESTION ${currentQuestionIndex + 1} / ${shuffledQuestions.length}`;
            document.getElementById('question-text').innerText = currentQ.q;
            document.getElementById('progress-bar').style.width = `${(currentQuestionIndex / shuffledQuestions.length) * 100}%`;

            const backBtn = document.getElementById('back-btn');
            backBtn.style.display = currentQuestionIndex > 0 ? 'flex' : 'none';

            const container = document.getElementById('options');
            container.innerHTML = '';
            currentQ.options.forEach(opt => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.innerText = opt.text;
                btn.onclick = () => handleAnswer(opt.weight);
                container.appendChild(btn);
            });
        }

        function handleAnswer(weight) {
            scores[weight]++;
            answerHistory.push(weight);
            
            currentQuestionIndex++;
            if (currentQuestionIndex < shuffledQuestions.length) {
                renderQuestion();
            } else {
                showResult();
            }
        }

        function goBack() {
            if (currentQuestionIndex > 0) {
                const lastWeight = answerHistory.pop();
                if (lastWeight) scores[lastWeight]--;
                currentQuestionIndex--;
                renderQuestion();
            }
        }

        function showResult() {
            let maxScore = -1;
            let resultKey = 'thai';
            for (const key in scores) {
                if (scores[key] > maxScore) {
                    maxScore = scores[key];
                    resultKey = key;
                }
            }
            currentResultKey = resultKey;
            displayResultContent(resultKey);
            showScreen('result-screen');
        }

        function displayResultContent(key) {
            const result = resultsData[key];
            const nameEl = document.getElementById('result-name');
            const subtitleEl = document.getElementById('result-subtitle');
            const descEl = document.getElementById('result-desc');
            const recommendedEl = document.getElementById('result-recommended');
            const imgEl = document.getElementById('result-image');

            // Update Theme Color
            document.documentElement.style.setProperty('--result-theme', result.color);

            nameEl.innerText = result.name;
            subtitleEl.innerText = result.subtitle;
            descEl.innerHTML = result.desc;
            recommendedEl.innerText = result.recommended;
            imgEl.src = result.image;
            imgEl.onerror = () => { imgEl.src = "https://via.placeholder.com/260?text=Food"; };

            renderExplorer(key);
        }

        function renderExplorer(activeKey) {
            const grid = document.getElementById('explorer-grid');
            grid.innerHTML = '';
            
            Object.keys(resultsData).forEach(key => {
                const btn = document.createElement('button');
                btn.className = `explore-btn ${key === activeKey ? 'active-choice' : ''}`;
                btn.innerText = resultsData[key].name;
                btn.onclick = () => displayResultContent(key);
                grid.appendChild(btn);
            });
        }

        function restartQuiz() {
            showScreen('start-screen');
        }

        function shareResult() {
            const result = resultsData[currentResultKey || 'thai'];
            const shareText = `ฉันได้ผลลัพธ์เป็น "${result.name}" จากควิซ "คุณเหมาะกับอาหารสัญชาติไหน" ลองมาเล่นกันดูสิ!`;
            const shareUrl = window.location.href;

            if (navigator.share) {
                navigator.share({
                    title: 'ผลลัพธ์ควิซสัญชาติอาหาร',
                    text: shareText,
                    url: shareUrl,
                }).catch(err => console.log('Error sharing:', err));
            } else {
                const dummy = document.createElement('input');
                document.body.appendChild(dummy);
                dummy.value = `${shareText} ${shareUrl}`;
                dummy.select();
                document.execCommand('copy');
                document.body.removeChild(dummy);
                
                showToast();
            }
        }

        function showToast() {
            const toast = document.getElementById('toast');
            toast.classList.add('show');
            setTimeout(() => {
                toast.classList.remove('show');
            }, 3000);
        }

        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }
    </script>
</body>
